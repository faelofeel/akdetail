<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы | AKDetail Буй</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <!-- Локальный SDK (чтобы не было ошибок) -->
  <script src="pocketbase.umd.js"></script>
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="AKDetail" class="logo-img">
    </a>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>
        <a href="reviews.html" class="active">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="contact-header">
      <span class="call-us">Позвони нам:</span>
      <a href="tel:+79205551234" class="phone">+7 (920) 555-12-34</a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Отзывы наших клиентов</h1>
    <p>Что говорят те, кто уже доверил нам свой автомобиль</p>
  </div>
</section>

<section class="reviews-section">
  <div class="container">
    <div class="review-grid" id="reviews-container"></div>
  </div>
</section>

<footer>
  <!-- твой обычный футер -->
</footer>

<script src="script.js"></script>

<script>
  const pb = new PocketBase('https://pocketbase-production-70159.up.railway.app');

  async function loadReviews() {
    try {
      const res = await pb.collection('reviews').getList(1, 50, { 
        sort: '-created' 
      });

      const container = document.getElementById('reviews-container');
      container.innerHTML = '';

      if (res.items.length === 0) {
        container.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Пока нет отзывов</p>';
        return;
      }

      res.items.forEach(item => {
        const card = `
          <div class="review-card">
            <div class="review-header">
              <h3>${item.name}</h3>
              <div class="review-date">${new Date(item.created).toLocaleDateString('ru-RU')}</div>
            </div>
            <p>${item.text}</p>
          </div>
        `;
        container.innerHTML += card;
      });
    } catch (err) {
      console.error('Ошибка загрузки отзывов:', err);
      document.getElementById('reviews-container').innerHTML = 
        '<p style="text-align:center;color:#e74c3c; grid-column:1/-1;">Не удалось загрузить отзывы. Попробуйте позже.</p>';
    }
  }

  // Загружаем отзывы сразу при открытии страницы
  loadReviews();
</script>

</body>
</html>
