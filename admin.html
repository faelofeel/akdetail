<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKDetail Admin</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="AKDetail" class="logo-img">
    </a>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="contact-header">
      <span class="call-us">Позвони нам:</span>
      <a href="tel:+79205551234" class="phone">+7 (920) 555-12-34</a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="admin-container">
  <h1>Админ-панель</h1>

  <!-- Вкладки -->
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="services">Услуги</button>
    <button class="tab-btn" data-tab="reviews">Отзывы</button>
  </div>

  <!-- Вкладка Услуги (оригинальная форма) -->
  <div id="tab-services" class="tab-content active">
    <h2>Управление услугами</h2>

    <div class="service-form">
      <h3 id="service-form-title">Добавить новую услугу</h3>
      <form id="service-form">
        <input type="hidden" id="service-id">

        <div class="form-group">
          <label for="title">Название услуги *</label>
          <input type="text" id="title" required>
        </div>

        <div class="form-group">
          <label for="description">Описание</label>
          <textarea id="description" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label for="price">Цена *</label>
          <input type="text" id="price" required placeholder="от 15 000 ₽">
        </div>

        <div class="form-group">
          <label for="time">Время выполнения *</label>
          <input type="text" id="time" required placeholder="1 день">
        </div>

        <div class="form-group">
          <label for="image">Фото услуги *</label>
          <input type="file" id="image" accept="image/*" required>
          <img id="preview" style="max-height:140px; margin-top:12px; border-radius:8px; display:none;" alt="Предпросмотр">
        </div>

        <div class="form-group">
          <label for="order">Порядок отображения</label>
          <input type="number" id="order" value="0">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Сохранить услугу</button>
          <button type="button" id="cancel-service-edit" class="btn-cancel hidden">Отмена</button>
        </div>
      </form>
    </div>

    <h3>Список услуг</h3>
    <div class="service-grid" id="service-list"></div>
  </div>

  <!-- Вкладка Отзывы -->
  <div id="tab-reviews" class="tab-content">
    <h2>Управление отзывами</h2>

    <div class="service-form">
      <h3 id="review-form-title">Добавить новый отзыв</h3>
      <form id="review-form">
        <input type="hidden" id="review-id">

        <div class="form-group">
          <label for="name">Имя клиента *</label>
          <input type="text" id="name" required placeholder="Максим Смирнов">
        </div>

        <div class="form-group">
          <label for="car">Марка авто</label>
          <input type="text" id="car" placeholder="Lada 2101">
        </div>

        <div class="form-group">
          <label for="service">Услуга</label>
          <input type="text" id="service" placeholder="Керамическое покрытие">
        </div>

        <div class="form-group">
          <label for="text">Текст отзыва *</label>
          <textarea id="text" rows="6" required placeholder="Мастера крутые!"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Сохранить отзыв</button>
          <button type="button" id="cancel-review-edit" class="btn-cancel hidden">Отмена</button>
        </div>
      </form>
    </div>

    <h3>Список отзывов</h3>
    <div class="review-grid" id="review-list"></div>
  </div>
</div>

<script src="pocketbase.umd.js"></script>
<script src="admin.js"></script>
<script src="script.js"></script>

</body>
</html>
