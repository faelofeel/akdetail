<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKDetail Admin — Управление услугами</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="AKDetail" class="logo-img">
    </a>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="contact-header">
      <span class="call-us">Позвони нам:</span>
      <a href="tel:+79205551234" class="phone">+7 (920) 555-12-34</a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="admin-container" style="max-width:1200px;margin:40px auto;padding:0 20px;">
  <h1>Управление услугами</h1>

  <div class="service-form" style="background:#222;padding:30px;border-radius:12px;margin-bottom:40px;">
    <h2 id="form-title">Добавить новую услугу</h2>
    <form id="service-form">
      <input type="hidden" id="service-id">
      <div class="form-group"><label>Название услуги *</label><input type="text" id="title" required></div>
      <div class="form-group"><label>Описание</label><textarea id="description" rows="4"></textarea></div>
      <div class="form-group"><label>Цена *</label><input type="text" id="price" required placeholder="от 15 000 ₽"></div>
      <div class="form-group"><label>Время выполнения *</label><input type="text" id="time" required placeholder="1 день"></div>
      <div class="form-group"><label>Фото услуги *</label><input type="file" id="image" accept="image/*" required></div>
      <div class="form-group"><label>Порядок отображения</label><input type="number" id="order" value="0"></div>

      <button type="submit" class="btn-primary btn-save">Сохранить услугу</button>
      <button type="button" id="cancel-edit" class="btn-secondary hidden">Отмена</button>
    </form>
  </div>

  <h2>Список услуг</h2>
  <div class="service-list" id="service-list"></div>
</div>

<!-- SDK PocketBase ДОЛЖЕН БЫТЬ ПЕРЕД admin.js -->
<script src="https://unpkg.com/pocketbase@0.22.1/dist/pocketbase.umd.js"></script>
<script src="admin.js"></script>
<script src="script.js"></script>

</body>
</html>
