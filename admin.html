<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKDetail Admin — Управление услугами</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="AKDetail" class="logo-img">
    </a>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="contact-header">
      <span class="call-us">Позвони нам:</span>
      <a href="tel:+79205551234" class="phone">+7 (920) 555-12-34</a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<main class="admin-main">
  <div class="admin-container">
    <h1 class="admin-title">Управление услугами</h1>

    <section class="admin-section service-form-section">
      <h2 class="form-title" id="form-title">Добавить новую услугу</h2>
      <form id="service-form" class="service-form">
        <input type="hidden" id="service-id">

        <div class="form-row">
          <div class="form-group">
            <label for="title">Название услуги *</label>
            <input type="text" id="title" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label for="description">Описание</label>
            <textarea id="description" rows="5"></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="price">Цена *</label>
            <input type="text" id="price" required placeholder="от 15 000 ₽">
          </div>
          <div class="form-group">
            <label for="time">Время выполнения *</label>
            <input type="text" id="time" required placeholder="1 день">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="image">Фото услуги *</label>
            <input type="file" id="image" accept="image/*" required>
            <img id="preview" class="preview-img" alt="Предпросмотр">
          </div>
          <div class="form-group">
            <label for="order">Порядок отображения</label>
            <input type="number" id="order" value="0">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Сохранить услугу</button>
          <button type="button" id="cancel-edit" class="btn-cancel hidden">Отмена</button>
        </div>
      </form>
    </section>

    <section class="admin-section service-list-section">
      <h2 class="section-title">Список услуг</h2>
      <div class="service-grid" id="service-list"></div>
    </section>
  </div>
</main>

<script src="https://unpkg.com/pocketbase@0.22.1/dist/pocketbase.umd.js"></script>
<script src="admin.js"></script>
<script src="script.js"></script>

</body>
</html>
