<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKDetail Admin</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Защита входа -->
<script>
  if (!localStorage.getItem('pb_token')) {
    window.location.href = 'login.html';
  }
  function logout() {
    localStorage.removeItem('pb_token');
    localStorage.removeItem('pb_user');
    window.location.href = 'login.html';
  }
</script>

<header>
  <div class="nav">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="AKDetail" class="logo-img">
    </a>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="contact-header">
      <span class="call-us">Позвони нам:</span>
      <a href="tel:+79205551234" class="phone">+7 (920) 555-12-34</a>
    </div>
    <!-- Кнопка "Выйти" -->
    <button onclick="logout()" style="background:#e74c3c;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:15px;cursor:pointer;margin-left:20px;">
      Выйти
    </button>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="admin-container">
  <h1>Админ-панель AKDetail</h1>

  <!-- Вкладки -->
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="services">Услуги</button>
    <button class="tab-btn" data-tab="reviews">Отзывы</button>
    <button class="tab-btn" data-tab="works">Наши работы</button>
  </div>

  <!-- Услуги -->
  <div id="tab-services" class="tab-content active">
    <h2>Управление услугами</h2>
    <div class="service-form">
      <h3 id="service-form-title">Добавить новую услугу</h3>
      <form id="service-form">
        <input type="hidden" id="service-id">
        <div class="form-group"><label>Название услуги *</label><input type="text" id="title" required></div>
        <div class="form-group"><label>Описание</label><textarea id="description" rows="4"></textarea></div>
        <div class="form-group"><label>Цена *</label><input type="text" id="price" required></div>
        <div class="form-group"><label>Время выполнения *</label><input type="text" id="time" required></div>
        <div class="form-group"><label>Фото услуги</label><input type="file" id="image" accept="image/*"></div>
        <div class="form-group"><label>Порядок отображения</label><input type="number" id="order" value="0"></div>
        <div class="form-actions">
          <button type="submit" class="btn-save">Сохранить услугу</button>
          <button type="button" id="cancel-service-edit" class="btn-cancel hidden">Отмена</button>
        </div>
      </form>
    </div>
    <h3>Список услуг</h3>
    <div class="service-grid" id="service-list"></div>
  </div>

  <!-- Отзывы -->
  <div id="tab-reviews" class="tab-content">
    <h2>Управление отзывами</h2>
    <div class="service-form">
      <h3 id="review-form-title">Добавить новый отзыв</h3>
      <form id="review-form">
        <input type="hidden" id="review-id">
        <div class="form-group"><label>Имя клиента *</label><input type="text" id="name" required></div>
        <div class="form-group"><label>Марка авто</label><input type="text" id="car"></div>
        <div class="form-group"><label>Услуга</label><input type="text" id="service"></div>
        <div class="form-group"><label>Текст отзыва *</label><textarea id="text" rows="6" required></textarea></div>
        <div class="form-actions">
          <button type="submit" class="btn-save">Сохранить отзыв</button>
          <button type="button" id="cancel-review-edit" class="btn-cancel hidden">Отмена</button>
        </div>
      </form>
    </div>
    <h3>Список отзывов</h3>
    <div class="review-grid" id="review-list"></div>
  </div>

  <!-- Наши работы -->
  <div id="tab-works" class="tab-content">
    <h2>Управление работами</h2>
    <div class="service-form">
      <h3 id="works-form-title">Добавить новую работу</h3>
      <form id="works-form">
        <input type="hidden" id="works-id">
        <div class="form-group"><label>Название авто *</label><input type="text" id="works-title" required></div>
        <div class="form-group"><label>Описание</label><textarea id="works-description" rows="4"></textarea></div>
        <div class="form-group"><label>Фото до/после (можно несколько)</label><input type="file" id="works-images" accept="image/*" multiple></div>

        <!-- БЛОК ПРЕВЬЮ ФОТО (добавлен сюда) -->
        <div id="works-preview" style="display: flex; flex-wrap: wrap; gap: 16px; margin: 16px 0;"></div>

        <!-- Кнопка удалить все фото -->
        <div style="margin: 16px 0;">
          <button type="button" id="clear-all-photos" style="background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">
            Удалить все добавленные фото
          </button>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">Сохранить работу</button>
          <button type="button" id="cancel-works-edit" class="btn-cancel hidden">Отмена</button>
        </div>
      </form>
    </div>
    <h3>Список работ</h3>
    <div class="works-grid" id="works-list"></div>
  </div>
</div>

<script src="pocketbase.umd.js"></script>
<script src="admin.js"></script>
</body>
</html>
