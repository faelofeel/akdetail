<!DOCTYPE html><html lang="ru"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AKDetail Admin</title><link rel="icon" type="image/png" href="/akdetail/images/logo.png"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"><!-- Глобальные стили --><link rel="stylesheet" href="/akdetail/global.css"><link rel="stylesheet" href="/akdetail/assets/global.B6euM4VR.css"></head> <body> <div class="login-box"> <h1>Вход в админ-панель</h1> <p class="subtitle">Введите данные администратора</p> <form id="loginForm" autocomplete="off"> <div class="form-group"> <input type="email" id="email" placeholder="Email" maxlength="40" required> </div> <div class="form-group"> <input type="password" id="password" placeholder="Пароль" maxlength="20" minlength="6" required> </div> <button type="submit" id="submitBtn">Войти</button> </form> <div id="error" class="error"></div> </div> <script src="/akdetail/pocketbase.umd.js"></script> <script type="module">const i=new PocketBase("https://pocketbase-production-70159.up.railway.app");localStorage.getItem("pb_token")&&(window.location.href="/akdetail/admin");document.getElementById("loginForm").addEventListener("submit",async r=>{r.preventDefault();const a=document.getElementById("email").value.trim(),n=document.getElementById("password").value,t=document.getElementById("error"),e=document.getElementById("submitBtn");if(t.textContent="",!a||!n){t.textContent="Заполните все поля";return}if(n.length<6){t.textContent="Пароль слишком короткий (минимум 6 символов)";return}e.disabled=!0,e.textContent="Вход...";try{const o=await i.collection("users").authWithPassword(a,n);localStorage.setItem("pb_token",o.token),localStorage.setItem("pb_user",JSON.stringify(o.record)),window.location.href="/akdetail/admin"}catch{t.textContent="Неверный email или пароль"}finally{e.disabled=!1,e.textContent="Войти"}});</script> </body> </html>
