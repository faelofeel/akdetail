<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы | AKDetail Буй</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <script src="pocketbase.umd.js"></script>
</head>
<body>
  <!-- твой header -->

  <section class="page-hero">
    <div class="container">
      <h1>Отзывы наших клиентов</h1>
      <p>Что говорят те, кто уже доверил нам свой автомобиль</p>
    </div>
  </section>

  <section class="reviews-section">
    <div class="container">
      <div class="review-grid" id="reviews-container"></div>
    </div>
  </section>

  <!-- твой footer -->

  <script src="script.js"></script>

  <script>
    const pb = new PocketBase('https://pocketbase-production-70159.up.railway.app');

    async function loadReviews() {
      try {
        const res = await pb.collection('reviews').getList(1, 50, { sort: '-created' });
        const container = document.getElementById('reviews-container');
        container.innerHTML = '';

        if (res.items.length === 0) {
          container.innerHTML = '<p style="text-align:center;">Отзывов пока нет</p>';
          return;
        }

        res.items.forEach(item => {
          const card = `
            <div class="review-card">
              <div class="review-header">
                <h3>${item.name}</h3>
                <div class="review-date">${new Date(item.created).toLocaleDateString('ru-RU')}</div>
              </div>
              <p>${item.text}</p>
            </div>
          `;
          container.innerHTML += card;
        });
      } catch (err) {
        console.error('Ошибка загрузки отзывов:', err);
        document.getElementById('reviews-container').innerHTML = '<p style="text-align:center;color:#e74c3c;">Ошибка загрузки отзывов</p>';
      }
    }

    loadReviews();
  </script>
</body>
</html>
