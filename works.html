<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наши работы | AKDetail Буй</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <script src="pocketbase.umd.js"></script>
  <style>
    /* Стили слайдера внутри карточки */
    .work-slider {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
      border-radius: 12px 12px 0 0;
    }

    .work-slides {
      display: flex;
      transition: transform 0.5s ease;
      height: 100%;
    }

    .work-slide {
      flex: 0 0 100%;
      height: 100%;
    }

    .work-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .work-card:hover .work-slide img {
      transform: scale(1.08);
    }

    .slider-arrows {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .work-card:hover .slider-arrows {
      opacity: 1;
    }

    .slider-arrow {
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .slider-arrow:hover {
      background: rgba(74,144,226,0.7);
    }

    .slider-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .slider-dot {
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.3s;
    }

    .slider-dot.active {
      background: #4a90e2;
    }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="AKDetail" class="logo-img">
    </a>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html" class="active">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="contact-header">
      <span class="call-us">Позвони нам:</span>
      <a href="tel:+79205551234" class="phone">+7 (920) 555-12-34</a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Наши работы</h1>
    <p>До и после — реальные результаты</p>
  </div>
</section>

<section class="works-section">
  <div class="container">
    <div class="works-grid" id="works-grid"></div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">AK<span>Detail</span></div>
      <div class="footer-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </div>
      <div class="footer-info">
        <p>г. Буй, ул. Советская, 25</p>
        <p>+7 (920) 555-12-34</p>
        <p>© 2020–2026 AKDetail. Все права защищены.</p>
      </div>
    </div>
  </div>
</footer>

<script>
  const pb = new PocketBase('https://pocketbase-production-70159.up.railway.app');

  async function loadWorks() {
    const grid = document.getElementById('works-grid');
    if (!grid) return;

    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;">Загрузка работ...</p>';

    try {
      const res = await pb.collection('works').getList(1, 50);
      grid.innerHTML = '';

      if (res.items.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">Пока нет работ</p>';
        return;
      }

      res.items.forEach(item => {
        let slidesHTML = '';
        let dotsHTML = '';

        if (item.field && Array.isArray(item.field) && item.field.length > 0) {
          item.field.forEach((img, index) => {
            const url = `${pb.baseUrl}/api/files/${item.collectionId}/${item.id}/${img}`;
            slidesHTML += `<div class="work-slide" data-index="${index}">
              <img src="${url}" alt="${item.title || 'Работа'}" loading="eager">
            </div>`;
            dotsHTML += `<span class="slider-dot ${index === 0 ? 'active' : ''}" data-index="${index}"></span>`;
          });
        }

        const card = `
          <div class="work-card">
            <div class="work-slider" data-current="0">
              <div class="work-slides">
                ${slidesHTML || '<p style="color:#666;">Фото отсутствует</p>'}
              </div>
              ${item.field && item.field.length > 1 ? `
                <div class="slider-arrows">
                  <button class="slider-arrow prev">←</button>
                  <button class="slider-arrow next">→</button>
                </div>
                <div class="slider-dots">
                  ${dotsHTML}
                </div>
              ` : ''}
            </div>
            <div class="work-info">
              <h3>${item.title || 'Без названия'}</h3>
              <p>${item.description || 'Детейлинг выполнен на высшем уровне'}</p>
            </div>
          </div>
        `;
        grid.innerHTML += card;
      });

      // Инициализация слайдеров после загрузки всех карточек
      initSliders();
    } catch (err) {
      console.error('Ошибка загрузки:', err);
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#e74c3c;">Не удалось загрузить работы</p>';
    }
  }

  function initSliders() {
    document.querySelectorAll('.work-slider').forEach(slider => {
      const slides = slider.querySelector('.work-slides');
      const arrows = slider.querySelectorAll('.slider-arrow');
      const dots = slider.querySelectorAll('.slider-dot');

      let current = 0;
      const total = slides.children.length;

      function goTo(index) {
        current = index;
        slides.style.transform = `translateX(-${current * 100}%)`;
        dots.forEach((dot, i) => dot.classList.toggle('active', i === current));
      }

      if (arrows.length) {
        arrows[0].addEventListener('click', () => {
          current = (current - 1 + total) % total;
          goTo(current);
        });
        arrows[1].addEventListener('click', () => {
          current = (current + 1) % total;
          goTo(current);
        });
      }

      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => goTo(i));
      });
    });
  }

  // Запуск
  loadWorks();
</script>

</body>
</html>
