<section class="page-hero">
  <div class="container">
    <h1>Наши работы</h1>
    <p>До и после — реальные результаты</p>
  </div>

<section class="works-section">
  <div class="container">
    <div class="works-grid" id="works-grid"></div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">AK<span>Detail</span></div>
      <div class="footer-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>

        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>

      </div>

      </div>
    </div>
  </div>
</footer>

<script>
  const pb = new PocketBase('https://pocketbase-production-70159.up.railway.app');

  async function loadWorks() {
    const grid = document.getElementById('works-grid');
    if (!grid) return;

    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;">Загрузка работ...</p>';

    try {
      // Самый простой запрос без сортировки и параметров
      const res = await pb.collection('works').getList(1, 50);
      grid.innerHTML = '';

      if (res.items.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">Пока нет работ</p>';
        return;
      }

      res.items.forEach(item => {
        let imagesHTML = '';
        if (item.field && Array.isArray(item.field) && item.field.length > 0) {
          imagesHTML = item.field.map(img => {
            const url = `${pb.baseUrl}/api/files/${item.collectionId}/${item.id}/${img}`;
            return `<img src="${url}" alt="${item.title || 'Работа'}" loading="eager">`;  // ← loading="eager" убирает lazy-предупреждение
          }).join('');
        }

        const card = `
          <div class="work-card">
            <div class="work-images">
              ${imagesHTML || '<p style="color:#666;">Фото отсутствует</p>'}
            </div>
            <div class="work-info">
              <h3>${item.title || 'Без названия'}</h3>
              <p>${item.description || 'Описание отсутствует'}</p>
            </div>
          </div>
        `;
        grid.innerHTML += card;
      });
    } catch (err) {
      console.error('Ошибка загрузки:', err);
      grid.innerHTML = `
        <p style="grid-column:1/-1;text-align:center;color:#e74c3c;">
          Не удалось загрузить работы<br>
          <small>${err.message || 'Сервер вернул ошибку'}</small>
        </p>
      `;
    }
  }

  // Запуск
  loadWorks();
</script>

</body>
</html>
