<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наши работы | AKDetail Буй</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <script src="pocketbase.umd.js"></script>
  <style>
    .work-card {
      background: #1e1e1e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transition: all 0.3s ease;
      border: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .work-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .work-images {
      height: 280px;
      overflow: hidden;
      position: relative;
    }

    .work-images img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    .slider-arrows {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 15px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .work-card:hover .slider-arrows { opacity: 1; }

    .slider-arrow {
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
    }

    .slider-dots {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .work-card:hover .slider-dots { opacity: 1; }

    .slider-dot {
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-dot.active { background: #4a90e2; transform: scale(1.3); }

    .work-info {
      padding: 20px;
      flex: 1;
    }

    .work-info h3 {
      font-size: 22px;
      margin: 0 0 12px;
      color: #fff;
    }

    .work-info p {
      font-size: 16px;
      color: #ddd;
      line-height: 1.5;
    }

    /* ГАЛЕРЕЯ — без полос по бокам */
    .gallery-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .gallery-content {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .gallery-slides {
      display: flex;
      height: 100%;
      width: 100%;
      transition: transform 0.5s ease;
    }

    .gallery-slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .gallery-slide img {
      width: 100%;              /* Полная ширина — полос по бокам нет */
      height: auto;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 0 80px rgba(255,255,255,0.25);
    }

    .gallery-close {
      position: absolute;
      top: 25px;
      right: 35px;
      color: white;
      font-size: 40px;
      cursor: pointer;
      background: rgba(0,0,0,0.6);
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      z-index: 10000;
    }

    .gallery-close:hover { background: #e74c3c; }

    .gallery-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      z-index: 10000;
    }

    .gallery-arrow.prev { left: 30px; }
    .gallery-arrow.next { right: 30px; }

    .gallery-arrow:hover { background: #4a90e2; }

    .gallery-dots {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      z-index: 10000;
    }

    .gallery-dot {
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s;
    }

    .gallery-dot.active {
      background: #4a90e2;
      transform: scale(1.3);
    }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" alt="AKDetail" class="logo-img">
    </a>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html" class="active">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
    </div>
    <div class="contact-header">
      <span class="call-us">Позвони нам:</span>
      <a href="tel:+79205551234" class="phone">+7 (920) 555-12-34</a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Наши работы</h1>
    <p>До и после — реальные результаты</p>
  </div>
</section>

<section class="works-section">
  <div class="container">
    <div class="works-grid" id="works-grid"></div>
  </div>
</section>

<div class="gallery-modal" id="galleryModal">
  <div class="gallery-content">
    <button class="gallery-close" id="galleryClose">×</button>
    <button class="gallery-arrow prev" id="galleryPrev">←</button>
    <button class="gallery-arrow next" id="galleryNext">→</button>
    <div class="gallery-slides" id="gallerySlides"></div>
    <div class="gallery-dots" id="galleryDots"></div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo">AK<span>Detail</span></div>
      <div class="footer-links">
        <a href="index.html">Главная</a>
        <a href="services.html">Услуги</a>
        <a href="works.html">Наши работы</a>
        <a href="reviews.html">Отзывы</a>
        <a href="booking.html">Запись</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </div>
      <div class="footer-info">
        <p>г. Буй, ул. Советская, 25</p>
        <p>+7 (920) 555-12-34</p>
        <p>© 2020–2026 AKDetail. Все права защищены.</p>
      </div>
    </div>
  </div>
</footer>

<script>
  const pb = new PocketBase('https://pocketbase-production-70159.up.railway.app');
  let currentGalleryIndex = 0;
  let galleryImages = [];

  async function loadWorks() {
    const grid = document.getElementById('works-grid');
    grid.innerHTML = '<p style="text-align:center;color:#666;">Загрузка работ...</p>';

    try {
      const res = await pb.collection('works').getList(1, 50);
      grid.innerHTML = '';

      res.items.forEach(item => {
        const imagesArray = (item.field || []).map(img => 
          `${pb.baseUrl}/api/files/${item.collectionId}/${item.id}/${img}`
        );

        const card = document.createElement('div');
        card.className = 'work-card';

        const imagesDiv = document.createElement('div');
        imagesDiv.className = 'work-images';

        const slides = document.createElement('div');
        slides.className = 'work-slides';
        slides.style.display = 'flex';
        slides.style.transition = 'transform 0.5s';

        imagesArray.forEach((url, i) => {
          const img = document.createElement('img');
          img.src = url;
          img.loading = 'eager';
          img.dataset.index = i;
          slides.appendChild(img);
        });

        imagesDiv.appendChild(slides);

        if (imagesArray.length > 1) {
          const arrows = document.createElement('div');
          arrows.className = 'slider-arrows';
          arrows.innerHTML = `
            <button class="slider-arrow prev">←</button>
            <button class="slider-arrow next">→</button>
          `;
          imagesDiv.appendChild(arrows);

          const dots = document.createElement('div');
          dots.className = 'slider-dots';
          dots.innerHTML = imagesArray.map((_, i) => `
            <span class="slider-dot ${i===0?'active':''}" data-index="${i}"></span>
          `).join('');
          imagesDiv.appendChild(dots);
        }

        card.appendChild(imagesDiv);

        const info = document.createElement('div');
        info.className = 'work-info';
        info.innerHTML = `
          <h3>${item.title || 'Без названия'}</h3>
          <p>${item.description || 'Детейлинг выполнен на высшем уровне'}</p>
        `;
        card.appendChild(info);

        grid.appendChild(card);

        // Слайдер в карточке
        if (imagesArray.length > 1) {
          const slideContainer = card.querySelector('.work-slides');
          const prevBtn = card.querySelector('.prev');
          const nextBtn = card.querySelector('.next');
          const dotBtns = card.querySelectorAll('.slider-dot');

          let current = 0;
          const total = imagesArray.length;

          function goTo(i) {
            current = i;
            slideContainer.style.transform = `translateX(-${i * 100}%)`;
            dotBtns.forEach(d => d.classList.toggle('active', parseInt(d.dataset.index) === i));
          }

          if (prevBtn) prevBtn.addEventListener('click', () => goTo((current - 1 + total) % total));
          if (nextBtn) nextBtn.addEventListener('click', () => goTo((current + 1) % total));
          dotBtns.forEach(dot => dot.addEventListener('click', () => goTo(parseInt(dot.dataset.index))));
        }

        // Открытие галереи
        card.querySelectorAll('.work-images img').forEach(img => {
          img.addEventListener('click', () => {
            galleryImages = imagesArray;
            currentGalleryIndex = parseInt(img.dataset.index) || 0;
            openGallery();
          });
        });
      });
    } catch (e) {
      console.error(e);
      grid.innerHTML = '<p style="text-align:center;color:#e74c3c;">Не удалось загрузить работы</p>';
    }
  }

  function openGallery() {
    const modal = document.getElementById('galleryModal');
    const slides = document.getElementById('gallerySlides');
    const dotsContainer = document.getElementById('galleryDots');

    slides.innerHTML = '';
    galleryImages.forEach(url => {
      const div = document.createElement('div');
      div.className = 'gallery-slide';
      div.innerHTML = `<img src="${url}" alt="Работа">`;
      slides.appendChild(div);
    });

    dotsContainer.innerHTML = galleryImages.map((_, i) => `
      <span class="gallery-dot ${i===currentGalleryIndex?'active':''}" data-index="${i}"></span>
    `).join('');

    dotsContainer.querySelectorAll('.gallery-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        currentGalleryIndex = parseInt(dot.dataset.index);
        goToSlide(currentGalleryIndex);
      });
    });

    goToSlide(currentGalleryIndex);
    modal.style.display = 'flex';
  }

  function goToSlide(i) {
    currentGalleryIndex = i;
    document.getElementById('gallerySlides').style.transform = `translateX(-${i*100}%)`;
    document.querySelectorAll('.gallery-dot').forEach(d => {
      d.classList.toggle('active', parseInt(d.dataset.index) === i);
    });
  }

  document.getElementById('galleryClose').addEventListener('click', () => document.getElementById('galleryModal').style.display = 'none');
  document.getElementById('galleryPrev').addEventListener('click', () => goToSlide((currentGalleryIndex - 1 + galleryImages.length) % galleryImages.length));
  document.getElementById('galleryNext').addEventListener('click', () => goToSlide((currentGalleryIndex + 1) % galleryImages.length));

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('galleryModal').style.display = 'none';
  });

  loadWorks();
</script>
</body>
</html>
