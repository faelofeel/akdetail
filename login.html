<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в админ-панель | AKDetail</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-box">
    <h1>Вход в админ-панель</h1>
    <p class="subtitle">Введите данные администратора</p>
    
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <input 
          type="email" 
          id="email" 
          placeholder="Email" 
          maxlength="40" 
          required
          autocomplete="off"
        >
      </div>
      <div class="form-group">
        <input 
          type="password" 
          id="password" 
          placeholder="Пароль" 
          maxlength="20" 
          minlength="6" 
          required
          autocomplete="off"
        >
      </div>
      <button type="submit" id="submitBtn">Войти</button>
    </form>
    
    <div id="error" class="error"></div>
  </div>

  <script src="pocketbase.umd.js"></script>
  <script src="login.js"></script>
</body>
</html>
